version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: trading-engine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build: .
    container_name: trading-engine-app
    ports:
      - "12000:12000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
